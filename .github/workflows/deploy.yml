name: Deploy to Server

on:
  workflow_run:
    workflows: ["Run Tests"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install

      - name: Generate SvelteKit files
        run: bunx svelte-kit sync

      - name: Build application
        run: bun run build

      - name: Paste files to right location
        run: |
          cd ~/portail-etu
          # Wipe everything, including any stale hand-written .env: runtime
          # config is rewritten from GitHub Secrets in the next step, so the
          # server keeps no manual state and a fresh machine deploys identically.
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp ~/actions-runner/_work/refonte-portail-etu/refonte-portail-etu/* . -r

      - name: Write runtime environment from GitHub Secrets
        # Secrets are passed via env (masked in logs) rather than interpolated
        # into the script body. Bun auto-loads ~/portail-etu/.env at runtime, so
        # the pm2-launched server reads these without a rebuild. Empty values are
        # safe: the app code falls back to public defaults for the URLs and
        # disables the avatar proxy when GALLERY_API_KEY is unset.
        env:
          PUBLIC_CANARI_URL: ${{ secrets.PUBLIC_CANARI_URL }}
          GALLERY_API_URL: ${{ secrets.GALLERY_API_URL }}
          GALLERY_API_KEY: ${{ secrets.GALLERY_API_KEY }}
          PORTAL_URL: ${{ secrets.PORTAL_URL }}
        run: |
          cd ~/portail-etu
          cat > .env <<EOF
          PUBLIC_CANARI_URL=${PUBLIC_CANARI_URL}
          GALLERY_API_URL=${GALLERY_API_URL}
          GALLERY_API_KEY=${GALLERY_API_KEY}
          PORTAL_URL=${PORTAL_URL}
          EOF

      - name: Restart server
        run: |
          pm2 restart ./ecosystem.config.cjs --update-env || pm2 start ./ecosystem.config.cjs
